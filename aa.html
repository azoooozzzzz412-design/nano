<style>
@import url('https://fonts.googleapis.com/css2?family=Paprika&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Poppins:wght@400;700&display=swap');
</style>
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <title>تتبع المصروف الشهري</title>

    <style>
        body {
            font-family: "Segoe UI", Tahoma, Arial, sans-serif;
            background: #000; /* خلفية سوداء */
            color: #fff;      /* كتابة بيضاء */
            margin: 0;
            padding: 0;
        }

        header {
            background: #111;
            color: #fff;
            padding: 15px 25px;
            text-align: center;
            border-bottom: 1px solid #444;
        }

        main {
            max-width: 1000px;
            margin: 25px auto;
            background: #111;
            padding: 20px 25px 30px;
            border: 1px solid #333;
            border-radius: 8px;
        }

        h1, h2 {
            margin-top: 0;
            color: #fff;
        }

        .form-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 10px;
        }

        .form-row > div {
            flex: 1 1 180px;
            min-width: 150px;
        }

        label {
            display: block;
            margin-bottom: 4px;
            font-size: 0.9rem;
            color: #ccc;
        }

        input[type="text"],
        input[type="number"],
        input[type="date"],
        input[type="month"],
        select {
            width: 100%;
            padding: 6px 8px;
            border-radius: 4px;
            border: 1px solid #555;
            background: #222; /* خانات رصاصية غامقة */
            color: #fff;      /* كتابة بيضاء */
            box-sizing: border-box;
            font-size: 0.9rem;
        }

        button {
            padding: 8px 14px;
            border-radius: 4px;
            border: none;
            cursor: pointer;
            font-size: 0.9rem;
        }

        button.primary {
            background: #1976d2;
            color: #fff;
        }

        button.secondary {
            background: #444;
            color: #fff;
        }

        button.danger {
            background: #b71c1c;
            color: #fff;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            font-size: 0.9rem;
            color: #fff;
        }

        th, td {
            border: 1px solid #444;
            padding: 6px 8px;
            text-align: center;
        }

        th {
            background: #222;
        }

        tfoot td {
            font-weight: bold;
            background: #222;
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
            margin-top: 15px;
        }

        .controls > div {
            flex: 1 1 200px;
            min-width: 180px;
        }

        .note {
            font-size: 0.8rem;
            color: #aaa;
            margin-top: 8px;
        }
    </style>
</head>

<body>

<header>
    <h1>نظام تتبع المصروف الشهري</h1>
</header>

<main>
    <section>
        <h2>إضافة مصروف جديد</h2>

        <div class="form-row">
            <div>
                <label>التاريخ</label>
                <input type="date" id="dateInput" />
            </div>

            <div>
                <label>التصنيف</label>
                <input type="text" id="categoryInput" placeholder="مثال: طعام، مواصلات..." />
            </div>

            <div>
                <label>الوصف</label>
                <input type="text" id="descInput" placeholder="وصف مختصر" />
            </div>

            <div>
                <label>المبلغ (ريال)</label>
                <input type="number" id="amountInput" min="0" step="0.01" placeholder="0.00" />
            </div>
        </div>

        <button class="primary" id="addBtn">إضافة إلى الجدول</button>

        <p class="note">يمكنك لاحقًا تصدير البيانات إلى ملف CSV وفتحه في Excel.</p>
    </section>

    <hr style="margin: 25px 0; border-color:#333;" />

    <section>
        <h2>جدول المصروفات</h2>

        <div class="controls">
            <div>
                <label>اختر الشهر</label>
                <input type="month" id="monthFilter" />
            </div>

            <div>
                <button class="secondary" id="calcBtn">حساب مجموع الشهر</button>
            </div>

            <div>
                <button class="secondary" id="exportBtn">تصدير CSV</button>
            </div>

            <div>
                <button class="danger" id="clearBtn">مسح الكل</button>
            </div>
        </div>

        <table id="expensesTable">
            <thead>
                <tr>
                    <th>#</th>
                    <th>date</th>
                    <th>month</th>
                    <th>Classification</th>
                    <th>Description</th>
                    <th>The amount
</th>
                </tr>
            </thead>

            <tbody></tbody>

            <tfoot>
                <tr>
                    <td colspan="5">مجموع مصروف الشهر</td>
                    <td id="monthTotal">0.00</td>
                </tr>
            </tfoot>
        </table>
    </section>
</main>

<script>
    const expenses = [];

    const dateInput = document.getElementById("dateInput");
    const categoryInput = document.getElementById("categoryInput");
    const descInput = document.getElementById("descInput");
    const amountInput = document.getElementById("amountInput");

    const addBtn = document.getElementById("addBtn");
    const calcBtn = document.getElementById("calcBtn");
    const exportBtn = document.getElementById("exportBtn");
    const clearBtn = document.getElementById("clearBtn");

    const monthFilter = document.getElementById("monthFilter");
    const expensesTableBody = document.querySelector("#expensesTable tbody");
    const monthTotalCell = document.getElementById("monthTotal");

    addBtn.addEventListener("click", () => {
        const dateVal = dateInput.value;
        const categoryVal = categoryInput.value.trim();
        const descVal = descInput.value.trim();
        const amountVal = parseFloat(amountInput.value);

        if (!dateVal || isNaN(amountVal)) {
            alert("الرجاء إدخال التاريخ والمبلغ");
            return;
        }

        const expense = {
            date: dateVal,
            month: dateVal.slice(0, 7),
            category: categoryVal || "-",
            desc: descVal || "-",
            amount: amountVal
        };

        expenses.push(expense);
        renderTable();

        categoryInput.value = "";
        descInput.value = "";
        amountInput.value = "";
    });

    function renderTable() {
        expensesTableBody.innerHTML = "";

        expenses.forEach((exp, index) => {
            const tr = document.createElement("tr");

            tr.innerHTML = `
                <td>${index + 1}</td>
                <td>${exp.date}</td>
                <td>${exp.month}</td>
                <td>${exp.category}</td>
                <td>${exp.desc}</td>
                <td>${exp.amount.toFixed(2)}</td>
            `;

            expensesTableBody.appendChild(tr);
        });
    }

    calcBtn.addEventListener("click", () => {
        const monthVal = monthFilter.value;

        if (!monthVal) {
            alert("اختر شهرًا أولاً");
            return;
        }

        let total = 0;

        expenses.forEach(exp => {
            if (exp.month === monthVal) total += exp.amount;
        });

        monthTotalCell.textContent = total.toFixed(2);
    });

    exportBtn.addEventListener("click", () => {
        if (expenses.length === 0) {
            alert("لا توجد بيانات");
            return;
        }

        let csv = "رقم,التاريخ,الشهر,التصنيف,الوصف,المبلغ\n";

        expenses.forEach((exp, i) => {
            csv += `${i + 1},${exp.date},${exp.month},"${exp.category}","${exp.desc}",${exp.amount}\n`;
        });

        const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
        const url = URL.createObjectURL(blob);

        const a = document.createElement("a");
        a.href = url;
        a.download = "المصروفات.csv";
        a.click();

        URL.revokeObjectURL(url);
    });

    clearBtn.addEventListener("click", () => {
        if (!confirm("هل تريد مسح كل البيانات")) return;

        expenses.length = 0;
        renderTable();
        monthTotalCell.textContent = "0.00";
    });
</script>

</body>
</html>
